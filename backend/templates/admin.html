<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Design da Tela: {{ config.nome_setor }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card-preview {
            border-radius: 15px;
            overflow: hidden;
            border: 5px solid #ddd;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .sidebar-setores { background: #fff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-setor { text-align: left; margin-bottom: 5px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="/admin" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar ao Menu</a>
        <h2 class="fw-bold m-0">Personalizar: <span class="text-primary">{{ config.nome_setor }}</span></h2>
        <div></div>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="sidebar-setores">
                <h5 class="mb-3">Configurar Setor:</h5>
                <div class="d-grid gap-2">
                    <a href="/admin/config/Açougue" class="btn {% if config.nome_setor == 'Açougue' %}btn-primary{% else %}btn-light{% endif %} btn-setor">🥩 Açougue</a>
                    <a href="/admin/config/Padaria" class="btn {% if config.nome_setor == 'Padaria' %}btn-primary{% else %}btn-light{% endif %} btn-setor">🍞 Padaria</a>
                    <a href="/admin/config/Hortifruti" class="btn {% if config.nome_setor == 'Hortifruti' %}btn-primary{% else %}btn-light{% endif %} btn-setor">🥦 Hortifruti</a>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <form action="/admin/salvar" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="nome_setor" value="{{ config.nome_setor }}">

                <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 20px;">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="fw-bold mb-3"><i class="bi bi-palette"></i> Cores e Estilo</h5>
                            <div class="mb-3">
                                <label class="form-label">Cor de Fundo</label>
                                <input type="color" name="cor_fundo" id="cp_fundo" class="form-control form-control-color w-100" value="{{ config.cor_fundo }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Cor do Texto</label>
                                <input type="color" name="cor_texto" id="cp_texto" class="form-control form-control-color w-100" value="{{ config.cor_texto }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Cor de Destaque (Preços)</label>
                                <input type="color" name="cor_destaque" id="cp_destaque" class="form-control form-control-color w-100" value="{{ config.cor_destaque }}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h5 class="fw-bold mb-3"><i class="bi bi-image"></i> Visual</h5>
                            <div class="mb-3">
                                <label class="form-label">Imagem de Fundo (Papel de Parede)</label>
                                <input type="file" name="imagem_fundo" class="form-control">
                                {% if config.imagem_fundo %}
                                <div class="mt-2 small text-success">✓ Imagem ativa: {{ config.imagem_fundo }}</div>
                                {% endif %}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fonte da Letra</label>
                                <select name="fonte_familia" class="form-select">
                                    <option value="'Oswald', sans-serif" {% if config.fonte_familia == "'Oswald', sans-serif" %}selected{% endif %}>Oswald (Recomendado)</option>
                                    <option value="'Roboto Condensed', sans-serif" {% if config.fonte_familia == "'Roboto Condensed', sans-serif" %}selected{% endif %}>Roboto Condensed</option>
                                    <option value="Arial" {% if config.fonte_familia == "Arial" %}selected{% endif %}>Arial</option>
                                </select>
                            </div>
                            <div id="preview" class="card-preview" style="background-color: {{ config.cor_fundo }}; color: {{ config.cor_texto }};">
                                <div class="text-center">
                                    <div style="font-size: 0.8rem;">PREVIEW</div>
                                    <div style="font-size: 1.5rem; font-weight: 900;">PRODUTO</div>
                                    <div id="prev_destaque" style="font-size: 2.5rem; font-weight: 900; color: {{ config.cor_destaque }};">R$ 29,90</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <hr>
                    <div class="text-end">
                        
<div class="mb-4 border-top pt-4">
    <h5 class="fw-bold mb-3"><i class="bi bi-layout-split"></i> Como a TV deve se comportar?</h5>
    <div class="row g-3">
        <div class="col">
            <input type="radio" class="btn-check" name="modo_exibicao" id="modo_pura" value="tabela_pura" {% if config.modo_exibicao == 'tabela_pura' %}checked{% endif %}>
            <label class="btn btn-outline-primary w-100 p-2 d-flex flex-column align-items-center" for="modo_pura">
                <i class="bi bi-distribute-horizontal fs-2"></i>
                <small class="fw-bold">Apenas Tabela</small>
            </label>
        </div>

        <div class="col">
            <input type="radio" class="btn-check" name="modo_exibicao" id="modo_tabela" value="tabela" {% if config.modo_exibicao == 'tabela' %}checked{% endif %}>
            <label class="btn btn-outline-primary w-100 p-2 d-flex flex-column align-items-center" for="modo_tabela">
                <i class="bi bi-layout-sidebar-reverse fs-2"></i>
                <small class="fw-bold">Tabela + 1 Promo</small>
            </label>
        </div>

        <div class="col">
            <input type="radio" class="btn-check" name="modo_exibicao" id="modo_tabela_dupla" value="tabela_dupla" {% if config.modo_exibicao == 'tabela_dupla' %}checked{% endif %}>
            <label class="btn btn-outline-primary w-100 p-2 d-flex flex-column align-items-center" for="modo_tabela_dupla">
                <i class="bi bi-layout-three-columns fs-2"></i>
                <small class="fw-bold">Tabela + 2 Promos</small>
            </label>
        </div>

        <div class="col">
            <input type="radio" class="btn-check" name="modo_exibicao" id="modo_promo1" value="promo1" {% if config.modo_exibicao == 'promo1' %}checked{% endif %}>
            <label class="btn btn-outline-primary w-100 p-2 d-flex flex-column align-items-center" for="modo_promo1">
                <i class="bi bi-fullscreen fs-2"></i>
                <small class="fw-bold">1 Promo Gigante</small>
            </label>
        </div>

        <div class="col">
            <input type="radio" class="btn-check" name="modo_exibicao" id="modo_promo2" value="promo2" {% if config.modo_exibicao == 'promo2' %}checked{% endif %}>
            <label class="btn btn-outline-primary w-100 p-2 d-flex flex-column align-items-center" for="modo_promo2">
                <i class="bi bi-grid-1x2 fs-2"></i>
                <small class="fw-bold">2 Promos Lado a Lado</small>
            </label>
        </div>
    </div>
</div>

                        <button type="submit" class="btn btn-primary btn-lg px-5" style="border-radius: 10px;">Salvar Configurações</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Script simples para atualizar o preview conforme o usuário mexe nas cores
    const cpFundo = document.getElementById('cp_fundo');
    const cpTexto = document.getElementById('cp_texto');
    const cpDestaque = document.getElementById('cp_destaque');
    const preview = document.getElementById('preview');
    const prevDestaque = document.getElementById('prev_destaque');

    cpFundo.addEventListener('input', () => preview.style.backgroundColor = cpFundo.value);
    cpTexto.addEventListener('input', () => preview.style.color = cpTexto.value);
    cpDestaque.addEventListener('input', () => prevDestaque.style.color = cpDestaque.value);
</script>

</body>
</html>
